name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build
      - run: npm run package
      - uses: actions/upload-artifact@v4
        with:
          name: mssgs-vsix-${{ github.ref_name }}
          path: packages/extension/mssgs-0.1.0.vsix
          if-no-files-found: error
      - name: Publish to Visual Studio Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npm run publish --workspace=packages/extension
